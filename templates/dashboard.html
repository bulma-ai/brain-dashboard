<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Bulma's Brain Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #151520;
            --bg-card: rgba(255, 255, 255, 0.04);
            --accent-cyan: #00d4ff;
            --accent-purple: #9d4edd;
            --accent-green: #00ff88;
            --accent-orange: #ffaa00;
            --accent-red: #ff4444;
            --text-primary: #ffffff;
            --text-secondary: #888899;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 16px;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(157, 78, 221, 0.15) 100%);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-cyan);
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .timestamp {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        /* Grid Layout - Responsive */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-icon {
            font-size: 1.3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
        }
        
        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        /* Resource Bars */
        .resource-item {
            margin-bottom: 16px;
        }
        
        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .resource-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .resource-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .progress-fill.low { background: var(--accent-green); }
        .progress-fill.medium { background: var(--accent-orange); }
        .progress-fill.high { background: var(--accent-red); }
        
        /* Tables */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 300px;
        }
        
        .data-table th {
            text-align: left;
            padding: 10px 8px;
            color: var(--accent-cyan);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .data-table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
        }
        
        .data-table code {
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        /* Process name column */
        .data-table td:first-child {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .badge.success {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-green);
        }
        
        .badge.warning {
            background: rgba(255, 170, 0, 0.15);
            color: var(--accent-orange);
        }
        
        .badge.error {
            background: rgba(255, 68, 68, 0.15);
            color: var(--accent-red);
        }
        
        .badge.info {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
        }
        
        /* Service Cards Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .service-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 14px;
            border: 1px solid var(--border-color);
        }
        
        .service-card.running {
            border-color: rgba(0, 255, 136, 0.3);
        }
        
        .service-card.stopped {
            border-color: rgba(255, 68, 68, 0.3);
            opacity: 0.7;
        }
        
        .service-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }
        
        .service-port {
            font-family: 'Monaco', 'Consolas', monospace;
            color: var(--accent-cyan);
            font-size: 0.85rem;
        }
        
        .service-pid {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Wide Cards */
        .card.wide {
            grid-column: 1 / -1;
        }
        
        /* Network Info */
        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .network-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 6px;
        }
        
        .network-item label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .network-item value {
            display: block;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9rem;
            word-break: break-all;
        }
        
        /* Skills List */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        
        .skill-item {
            background: rgba(157, 78, 221, 0.1);
            border-left: 3px solid var(--accent-purple);
            padding: 12px;
            border-radius: 0 6px 6px 0;
        }
        
        .skill-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        
        .skill-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        /* Identity/User Cards */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 6px;
        }
        
        .info-item h3 {
            font-size: 0.8rem;
            color: var(--accent-cyan);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .info-item p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .card.wide {
                grid-column: 1;
            }
            
            .network-grid {
                grid-template-columns: 1fr;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
            }
            
            .data-table {
                font-size: 0.8rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 8px 6px;
            }
        }
        
        /* Auto-refresh indicator */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-green);
        }
        
        .refresh-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .refresh-btn {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Bulma's Brain</h1>
            <p class="subtitle">Digital Assistant Configuration Dashboard</p>
            <p class="timestamp" id="timestamp">Loading...</p>
        </header>
        
        <div class="dashboard-grid">
            <!-- System Resources -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">📊</div>
                    <h2>System Resources</h2>
                </div>
                <div id="resources-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Network Info -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">🌐</div>
                    <h2>Network</h2>
                </div>
                <div id="network-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Running Services -->
            <div class="card wide">
                <div class="card-header">
                    <div class="card-icon">⚡</div>
                    <h2>Running Services</h2>
                </div>
                <div id="services-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Open Ports -->
            <div class="card wide">
                <div class="card-header">
                    <div class="card-icon">🔌</div>
                    <h2>Open Ports</h2>
                </div>
                <div class="table-container" id="ports-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Top Processes -->
            <div class="card wide">
                <div class="card-header">
                    <div class="card-icon">⚙️</div>
                    <h2>Top Processes</h2>
                </div>
                <div class="table-container" id="processes-content">
                    <p>Loading...</p>
                </div>
            </div>
            
            <!-- Installed Tools -->
            <div class="card wide">
                <div class="card-header">
                    <div class="card-icon">🛠️</div>
                    <h2>Installed Tools</h2>
                </div>
                <div class="table-container" id="tools-content">
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <div class="refresh-indicator">Live Updates</div>
        <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
    </div>
    
    <script>
        // Fetch and update all data
        async function fetchData() {
            try {
                const response = await fetch('/api/system');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        
        // Update dashboard with data
        function updateDashboard(data) {
            // Update timestamp
            document.getElementById('timestamp').textContent = 'Last updated: ' + new Date(data.timestamp).toLocaleString();
            
            // Update resources
            updateResources(data.resources);
            
            // Update network
            updateNetwork(data.network);
            
            // Update services
            updateServices(data.services);
            
            // Update ports
            updatePorts(data.ports);
            
            // Update processes
            updateProcesses(data.processes);
            
            // Update tools
            updateTools(data.tools);
        }
        
        function updateResources(resources) {
            if (resources.error) {
                document.getElementById('resources-content').innerHTML = `<p>Error: ${resources.error}</p>`;
                return;
            }
            
            const cpuClass = resources.cpu_percent < 50 ? 'low' : resources.cpu_percent < 80 ? 'medium' : 'high';
            const memClass = resources.memory.percent < 50 ? 'low' : resources.memory.percent < 80 ? 'medium' : 'high';
            const diskClass = resources.disk.percent < 70 ? 'low' : resources.disk.percent < 90 ? 'medium' : 'high';
            
            document.getElementById('resources-content').innerHTML = `
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">CPU (${resources.cpu_count} cores)</span>
                        <span class="resource-value" style="color: var(--accent-${cpuClass === 'high' ? 'red' : cpuClass === 'medium' ? 'orange' : 'green'})">${resources.cpu_percent.toFixed(1)}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${cpuClass}" style="width: ${Math.min(resources.cpu_percent, 100)}%"></div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">Memory</span>
                        <span class="resource-value" style="color: var(--accent-${memClass === 'high' ? 'red' : memClass === 'medium' ? 'orange' : 'green'})">${resources.memory.used.toFixed(1)} / ${resources.memory.total.toFixed(1)} GB</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${memClass}" style="width: ${resources.memory.percent}%"></div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">Disk</span>
                        <span class="resource-value" style="color: var(--accent-${diskClass === 'high' ? 'red' : diskClass === 'medium' ? 'orange' : 'green'})">${resources.disk.used.toFixed(0)} / ${resources.disk.total.toFixed(0)} GB</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${diskClass}" style="width: ${resources.disk.percent}%"></div>
                    </div>
                </div>
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                    <div class="resource-header">
                        <span class="resource-label">Load Average</span>
                        <span class="resource-value">${resources.load_avg['1min'].toFixed(2)} / ${resources.load_avg['5min'].toFixed(2)} / ${resources.load_avg['15min'].toFixed(2)}</span>
                    </div>
                </div>
            `;
        }
        
        function updateNetwork(network) {
            document.getElementById('network-content').innerHTML = `
                <div class="network-grid">
                    <div class="network-item">
                        <label>Public IP</label>
                        <value>${network.public_ip}</value>
                    </div>
                    <div class="network-item">
                        <label>Local IP</label>
                        <value>${network.local_ip}</value>
                    </div>
                    <div class="network-item">
                        <label>Hostname</label>
                        <value>${network.hostname}</value>
                    </div>
                    <div class="network-item">
                        <label>MAC Address</label>
                        <value>${network.mac_address}</value>
                    </div>
                </div>
            `;
        }
        
        function updateServices(services) {
            if (!services || services.length === 0) {
                document.getElementById('services-content').innerHTML = '<p>No services running</p>';
                return;
            }
            
            const cards = services.map(s => `
                <div class="service-card ${s.status === 'Running' ? 'running' : 'stopped'}">
                    <div class="service-name">${s.name}</div>
                    <div class="service-port">Port: ${s.port}</div>
                    <div class="service-pid">PID: ${s.pid}</div>
                    <div style="margin-top: 6px;"><span class="badge ${s.status === 'Running' ? 'success' : 'error'}">${s.status}</span></div>
                </div>
            `).join('');
            
            document.getElementById('services-content').innerHTML = `
                <div class="services-grid">${cards}</div>
            `;
        }
        
        function updatePorts(ports) {
            if (!ports || ports.length === 0) {
                document.getElementById('ports-content').innerHTML = '<p>No open ports found</p>';
                return;
            }
            
            if (ports[0].error) {
                document.getElementById('ports-content').innerHTML = `<p>Error: ${ports[0].error}</p>`;
                return;
            }
            
            const rows = ports.map(p => `
                <tr>
                    <td><code>${p.port}</code></td>
                    <td><code>${p.address}</code></td>
                    <td>${p.protocol}</td>
                    <td><span class="badge success">${p.status}</span></td>
                    <td><code>${p.pid || '—'}</code></td>
                    <td>${p.process}</td>
                </tr>
            `).join('');
            
            document.getElementById('ports-content').innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Port</th>
                            <th>Address</th>
                            <th>Protocol</th>
                            <th>Status</th>
                            <th>PID</th>
                            <th>Process</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }
        
        function updateProcesses(processes) {
            if (!processes || processes.length === 0) {
                document.getElementById('processes-content').innerHTML = '<p>No process data</p>';
                return;
            }
            
            if (processes[0].error) {
                document.getElementById('processes-content').innerHTML = `<p>Error: ${processes[0].error}</p>`;
                return;
            }
            
            const rows = processes.map(p => {
                const memColor = p.memory > 10 ? 'var(--accent-red)' : p.memory > 5 ? 'var(--accent-orange)' : 'var(--text-secondary)';
                const cpuColor = p.cpu > 50 ? 'var(--accent-red)' : p.cpu > 20 ? 'var(--accent-orange)' : 'var(--text-secondary)';
                return `
                <tr>
                    <td title="PID: ${p.pid}">${p.name}</td>
                    <td style="color: ${cpuColor}">${p.cpu.toFixed(1)}%</td>
                    <td style="color: ${memColor}">${p.memory.toFixed(1)}%</td>
                    <td>${p.memory_mb.toFixed(0)} MB</td>
                    <td><span class="badge ${p.status === 'running' ? 'success' : 'info'}">${p.status}</span></td>
                </tr>
            `}).join('');
            
            document.getElementById('processes-content').innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Process</th>
                            <th>CPU %</th>
                            <th>Memory %</th>
                            <th>Memory (MB)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }
        
        function updateTools(tools) {
            if (!tools || tools.length === 0) {
                document.getElementById('tools-content').innerHTML = '<p>No tools data</p>';
                return;
            }
            
            const rows = tools.map(t => `
                <tr>
                    <td>${t.name}</td>
                    <td><code>${t.command}</code></td>
                    <td style="font-size: 0.75rem; color: var(--text-secondary);">${t.version}</td>
                    <td>${t.status}</td>
                </tr>
            `).join('');
            
            document.getElementById('tools-content').innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tool</th>
                            <th>Command</th>
                            <th>Version</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }
        
        // Initial load
        fetchData();
        
        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
